<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: none;
      position: relative;
      overflow-x: hidden;
      height: 2000px;
      min-height: 100vh;
      background-image: url("media/patternbg.png");
      background-size: cover;
    }

    header {
      background: white;
      padding: 2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    nav a {
      color: #ff46A2;
      margin-left: 1rem;
      text-decoration: none;
      font-weight: bold;
      text-transform: uppercase;
      transition: text-shadow 0.2s ease, transform 0.2s ease;
    }

    nav a:hover {
      text-shadow: 0 0 8px #ff46A2, 0 0 16px rgba(255, 70, 162, 0.6);
      transform: translateY(-1px);
    }

    .cart-wrapper {
      position: absolute;
      top: 400px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 300px;
      z-index: 10;  
    }

    /* ================= ROLLOVER SYSTEM ================= */

    .cart-behind {
      position: absolute;
      top: -700px;
      left: -1500px;
      width: 300%;
      z-index: 5;
      pointer-events: none;
    }

.cart-behind:hover {
  pointer-events: auto; 
}
    .cart-base {
      display: block;
      width: 300%;
      height: auto;
    }

    .cart-hover {
      position: absolute;
      top: 0;
      left: 0;
      width: 300%;
      height: auto;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    /* invisible hover box */
    .cart-behind::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* trigger hover */
    .cart-behind:hover .cart-hover {
      opacity: 1;
    }

    /* ================= CART UI ================= */

    #cart {
      position: relative;
      width: 440px;
      height: 390px;
      top: -200px;
      left: -30px;
      background: #fff;
      padding: 1rem;
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.7);
      z-index: 20;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #cart-items {
      flex: 1;
      overflow-y: auto;
      padding-right: 0.5rem;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .qty-controls button,
    .remove-btn {
      background: none;
      border: 1px solid #000;
      padding: 0.25rem 0.5rem;
      cursor: pointer;
    }

    #cart-items::-webkit-scrollbar {
      width: 8px;
    }

    #cart-items::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.3);
      border-radius: 4px;
    }

    .sticky-checkout {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: none;
    }

    @media (max-width: 768px) {
      .sticky-checkout {
        display: block;
      }
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="contact.html">Contact</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html">Cart</a>
    </nav>
  </header>

  <div class="cart-wrapper">
    <div class="cart-behind">
      <img src="media/cart1.png" alt="Cart graphic" class="cart-base">
      <img src="media/cartred.png" alt="Cart hover" class="cart-hover">
    </div>

    <div id="cart">
      <div id="cart-items"></div>
      <p>Total: $<strong><span id="cart-total">0.00</span></strong></p>
      <button id="checkout-btn">Checkout</button>
      <button onclick="clearCart()" style="margin-top:1rem;">Clear Cart</button>
    </div>
  </div>

  <div class="sticky-checkout">
    <strong>Total: $<span id="mobile-total">0.00</span></strong>
  </div>

  <script>
    const products = Array.from({ length: 12 }, (_, i) => ({
      name: `Fake Shirt #${i + 1}`,
      price: 25,
      image: `media/tshirt${i + 1}.png`
    }));

    let rawCart = JSON.parse(localStorage.getItem("cart")) || [];
    let cart = [];

    rawCart.forEach(item => {
      const existing = cart.find(c => c.image === item.image && c.size === item.size);
      if (existing) existing.qty += 1;
      else cart.push({
        name: products.find(p => p.image === item.image).name,
        price: 25,
        image: item.image,
        size: item.size,
        qty: 1
      });
    });

    function getTotal() {
      return cart.reduce((s, i) => s + i.price * i.qty, 0);
    }

    function renderCart() {
      const container = document.getElementById("cart-items");
      if (cart.length === 0) {
        container.innerText = "No items yet.";
        return;
      }
      container.innerHTML = cart.map((item, i) => `
        <div class="cart-item">
          <div>
            <img src="${item.image}" style="width:60px; margin-right:10px;">
            <strong>${item.name}</strong><br>
            Size: <strong>${item.size}</strong><br>
            $${item.price} × ${item.qty}
          </div>
          <div class="qty-controls">
            <button onclick="changeQty(${i}, -1)">−</button>
            <span>${item.qty}</span>
            <button onclick="changeQty(${i}, 1)">+</button>
            <button class="remove-btn" onclick="removeItem(${i})">Remove</button>
          </div>
        </div>
      `).join("");
    }

    function changeQty(i, d) {
      cart[i].qty += d;
      if (cart[i].qty <= 0) cart.splice(i, 1);
      saveAndRefresh();
    }

    function removeItem(i) {
      cart.splice(i, 1);
      saveAndRefresh();
    }

    function clearCart() {
      if (!confirm("Clear entire cart?")) return;
      cart = [];
      localStorage.removeItem("cart");
      saveAndRefresh();
    }

    function saveAndRefresh() {
      const expanded = [];
      cart.forEach(item => {
        for (let i = 0; i < item.qty; i++) {
          expanded.push({ image: item.image, size: item.size });
        }
      });
      localStorage.setItem("cart", JSON.stringify(expanded));
      renderCart();
      document.getElementById("cart-total").innerText = getTotal().toFixed(2);
      document.getElementById("mobile-total").innerText = getTotal().toFixed(2);
    }

    saveAndRefresh();
  </script>

</body>
</html>
