<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home - shrimp lot</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  min-height: 100vh;
  background-image: url("patternbg.png");
  background-size: cover;
}

/* ---------- HEADER ---------- */
header {
  background: white;
  color: #ff46A2;
  padding: 2rem 2rem;
}

/* ---------- NAV ---------- */
nav {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
}

nav a {
  color: #ff46A2;
  margin-left: 1rem;
  text-decoration: none;
  font-weight: bold;
  text-transform: uppercase;
  transition: text-shadow 0.2s ease, transform 0.2s ease;
}

nav a:hover {
  text-shadow: 0 0 8px #ff46A2, 0 0 16px rgba(255, 70, 162, 0.6);
  transform: translateY(-1px);
}

/* ---------- SHRIMPLOT TITLE ---------- */
.title-image {
  display: block;
  margin: 3rem 0 0 2rem;
  width: clamp(300px, 40vw, 700px);
  height: auto;
}

/* ---------- EYE WRAPPER ---------- */
.eye-wrapper {
  position: fixed;
  right: 5vw;
  bottom: 5vh;
  width: clamp(250px, 25vw, 450px);
  aspect-ratio: 5 / 3;
  pointer-events: none;
}

/* ---------- BIG PNG ---------- */
.eye-bg {
  position: absolute;
  right: -20%;
  bottom: -50%;
  width: 400%;
  height: auto;
  object-fit: contain;
  z-index: 0;
  pointer-events: none;
}

/* ---------- EYES ---------- */
.eye-container {
  position: absolute;
  left: -24%;
  top: -115%;
  width: 40%;
  aspect-ratio: 5 / 2;

  display: flex;
  justify-content: space-between;
  align-items: center;

  pointer-events: auto;
  cursor: grab;
  z-index: 2;
}

.eye {
  width: 22%;
  aspect-ratio: 1;
  background: white;
  border-radius: 50%;
  border: 0.25vw solid black;
  position: relative;
  overflow: hidden;
}

.pupil {
  width: 35%;
  aspect-ratio: 1;
  background: black;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  transition: transform 0.08s linear;
}

.eyelid {
  position: absolute;
  inset: 0;
  background: #d3d357;
  transform: translateY(-100%);
}

.blink {
  animation: blink 0.2s ease-in-out;
}

@keyframes blink {
  0% { transform: translateY(-100%); }
  50% { transform: translateY(0); }
  100% { transform: translateY(-100%); }
}

/* ---------- MOBILE ONLY ---------- */
@media (max-width: 768px) {
  header {
    padding: 1.25rem;
  }

  nav a {
    margin-left: 0;
    margin-right: 0.75rem;
    font-size: 0.9rem;
  }

  .title-image {
    margin: 2rem auto 0 auto;
    width: 80vw;
  }

  .eye-wrapper {
    right: 2vw;
    bottom: 2vh;
  }
}
</style>
</head>

<body>

<header>
  <nav>
    <a href="index.html">Home</a>
    <a href="contact.html">Contact</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart</a>
  </nav>
</header>

<img src="shrimplot.png" class="title-image" alt="Shrimplot">

<div class="eye-wrapper">
  <img src="index1.png" class="eye-bg" alt="">

  <div class="eye-container">
    <div class="eye">
      <div class="pupil"></div>
      <div class="eyelid"></div>
    </div>
    <div class="eye">
      <div class="pupil"></div>
      <div class="eyelid"></div>
    </div>
  </div>
</div>

<script>
const eyes = document.querySelectorAll('.eye');

/* ---------- CORE MOVE FUNCTION ---------- */
function moveEyesNormalized(nx, ny) {
  eyes.forEach(eye => {
    const pupil = eye.querySelector('.pupil');
    const max = eye.offsetWidth * 0.35;
    pupil.style.transform =
      `translate(${nx * max}px, ${ny * max}px)`;
  });
}

/* ---------- DESKTOP MOUSE ---------- */
window.addEventListener('mousemove', e => {
  const x = (e.clientX / window.innerWidth) * 2 - 1;
  const y = (e.clientY / window.innerHeight) * 2 - 1;
  moveEyesNormalized(x, y);
});

/* ---------- TOUCH FALLBACK ---------- */
window.addEventListener('touchmove', e => {
  if (e.touches.length) {
    const t = e.touches[0];
    const x = (t.clientX / window.innerWidth) * 2 - 1;
    const y = (t.clientY / window.innerHeight) * 2 - 1;
    moveEyesNormalized(x, y);
  }
}, { passive: true });

/* ---------- GYROSCOPE (MOBILE TILT) ---------- */
function enableGyro() {
  window.addEventListener('deviceorientation', e => {
    if (e.gamma === null || e.beta === null) return;

    // gamma: left/right, beta: forward/back
    const x = Math.max(-1, Math.min(1, e.gamma / 30));
    const y = Math.max(-1, Math.min(1, e.beta / 30));
    moveEyesNormalized(x, y);
  });
}

/* iOS permission handling */
if (typeof DeviceOrientationEvent !== 'undefined' &&
    typeof DeviceOrientationEvent.requestPermission === 'function') {

  document.body.addEventListener('click', () => {
    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') enableGyro();
      })
      .catch(() => {});
  }, { once: true });

} else {
  enableGyro();
}

/* ---------- BLINK ---------- */
function blink() {
  eyes.forEach(eye => {
    const lid = eye.querySelector('.eyelid');
    lid.classList.add('blink');
    setTimeout(() => lid.classList.remove('blink'), 150);
  });
  setTimeout(blink, Math.random() * 4000 + 2000);
}
blink();
</script>

</body>
</html>
